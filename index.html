<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Para Wendoline ❤️</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 22px;
      border-radius: 22px;
      text-align: center;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      animation: aparecer 1.4s ease;
    }

    .foto {
      width: 100%;
      height: 260px;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .foto img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* CLAVE */
      object-position: center;
    }

    h1 {
      color: #e63950;
      margin: 8px 0;
      font-size: 24px;
    }

    p {
      color: #444;
      font-size: 16px;
      line-height: 1.6;
      margin: 10px 0;
    }

    button {
      background: #e63950;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 17px;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 18px;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .heart {
      position: absolute;
      font-size: 20px;
      animation: flotar 7s linear infinite;
      opacity: 0.7;
    }

    @keyframes flotar {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }
  </style>
</head>

<body>

<audio id="musica" src="amor.m4a"></audio>

<div class="card" id="contenido">
  <div class="foto">
    <img src="foto.jpg" alt="Yo">
  </div>

  <h1>Wendoline ❤️</h1>
  <p>
    No fue casualidad.<br>
    Fue destino, fue tiempo,<br>
    y fueron ganas de elegirte.
  </p>

  <button onclick="iniciar()">Toca aquí 💖</button>
</div>

<script>
  function iniciar() {
    document.getElementById("musica").play();
    document.getElementById("contenido").innerHTML = `
      <h1>¿Quieres ser mi novia? 💍</h1>
      <p>
        Prometo cuidarte,<br>
        respetarte y amarte,<br>
        incluso en los días difíciles.<br><br>
        Hoy, mañana y siempre.
      </p>
      <button onclick="final()">Sí ❤️</button>
    `;
  }

  function final() {
    document.getElementById("contenido").innerHTML = `
      <h1>Te amo, Wendoline 🥹❤️</h1>
      <p>
        Gracias por decir que sí.<br>
        Este es solo el comienzo.
      </p>
    `;
  }

  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
  }, 450);
</script>

</body>
</html>
